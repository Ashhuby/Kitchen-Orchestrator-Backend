events {
    worker_connections 1024;
}

http {
    # Define the 'Upstreams' (The internal Docker addresses)
    upstream identity-api {
        server identity-api:8080;
    }

    upstream game-server {
        server game-server:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # IdentityAPI Routing
        location /api/ {
            proxy_pass http://identity-api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # GameServer SignalR / WebSocket Routing
        location /gamehub {
            proxy_pass http://game-server;
            
            # Required for SignalR WebSockets
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Standard headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # SignalR timeouts (prevents Nginx from killing idle game connections)
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Health Checks
        location /health-identity {
            proxy_pass http://identity-api/health;
        }

        location /health-game {
            proxy_pass http://game-server/health;
        }
    }
}